openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Damumed КМИС API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: patients
    description: Patient operations
  - name: appointments
    description: Appointment operations
  - name: forms
    description: Medical forms
  - name: schedule
    description: Schedule management
  - name: dashboard
    description: Dashboard summaries
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /patients:
    get:
      operationId: listPatients
      tags: [patients]
      summary: List all patients
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
      responses:
        "200":
          description: List of patients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Patient"
    post:
      operationId: createPatient
      tags: [patients]
      summary: Create a patient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePatientBody"
      responses:
        "201":
          description: Created patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"

  /patients/{id}:
    get:
      operationId: getPatient
      tags: [patients]
      summary: Get patient by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updatePatient
      tags: [patients]
      summary: Update a patient
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePatientBody"
      responses:
        "200":
          description: Updated patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"

  /patients/{id}/forms:
    get:
      operationId: getPatientForms
      tags: [forms]
      summary: Get all forms for a patient
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of medical forms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MedicalForm"

  /forms:
    post:
      operationId: createForm
      tags: [forms]
      summary: Create a medical form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFormBody"
      responses:
        "201":
          description: Created form
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MedicalForm"

  /forms/{id}:
    get:
      operationId: getForm
      tags: [forms]
      summary: Get form by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Medical form
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MedicalForm"
    patch:
      operationId: updateForm
      tags: [forms]
      summary: Update a medical form
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFormBody"
      responses:
        "200":
          description: Updated form
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MedicalForm"

  /forms/{id}/submit:
    post:
      operationId: submitForm
      tags: [forms]
      summary: Submit (confirm) a form by doctor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Submitted form
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MedicalForm"

  /appointments:
    get:
      operationId: listAppointments
      tags: [appointments]
      summary: List appointments
      parameters:
        - in: query
          name: patientId
          schema:
            type: integer
        - in: query
          name: date
          schema:
            type: string
        - in: query
          name: specialistType
          schema:
            type: string
      responses:
        "200":
          description: List of appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"
    post:
      operationId: createAppointment
      tags: [appointments]
      summary: Create appointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppointmentBody"
      responses:
        "201":
          description: Created appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /appointments/{id}:
    patch:
      operationId: updateAppointment
      tags: [appointments]
      summary: Update appointment status
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAppointmentBody"
      responses:
        "200":
          description: Updated appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /schedule/generate:
    post:
      operationId: generateSchedule
      tags: [schedule]
      summary: Auto-generate 9-day rehabilitation schedule for a patient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateScheduleBody"
      responses:
        "200":
          description: Generated appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/today:
    get:
      operationId: getTodayAppointments
      tags: [dashboard]
      summary: Get today's appointments
      responses:
        "200":
          description: Today's appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Patient:
      type: object
      properties:
        id:
          type: integer
        fullName:
          type: string
        birthDate:
          type: string
        gender:
          type: string
        iinNumber:
          type: string
        diagnosis:
          type: string
        ward:
          type: ["string", "null"]
        admissionDate:
          type: string
        dischargeDate:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, discharged, scheduled]
        attendingDoctor:
          type: string
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - fullName
        - birthDate
        - gender
        - iinNumber
        - diagnosis
        - admissionDate
        - status
        - attendingDoctor
        - createdAt
        - updatedAt

    CreatePatientBody:
      type: object
      properties:
        fullName:
          type: string
        birthDate:
          type: string
        gender:
          type: string
        iinNumber:
          type: string
        diagnosis:
          type: string
        ward:
          type: ["string", "null"]
        admissionDate:
          type: string
        attendingDoctor:
          type: string
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
      required:
        - fullName
        - birthDate
        - gender
        - iinNumber
        - diagnosis
        - admissionDate
        - attendingDoctor

    UpdatePatientBody:
      type: object
      properties:
        fullName:
          type: string
        diagnosis:
          type: string
        ward:
          type: ["string", "null"]
        dischargeDate:
          type: ["string", "null"]
        status:
          type: string
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]

    MedicalForm:
      type: object
      properties:
        id:
          type: integer
        patientId:
          type: integer
        formType:
          type: string
          enum: [primary_exam, daily_diary, epicrisis, consultation]
        complaints:
          type: ["string", "null"]
        anamnesis:
          type: ["string", "null"]
        objectiveStatus:
          type: ["string", "null"]
        diagnosis:
          type: ["string", "null"]
        treatment:
          type: ["string", "null"]
        recommendations:
          type: ["string", "null"]
        doctorNotes:
          type: ["string", "null"]
        status:
          type: string
          enum: [draft, submitted]
        submittedAt:
          type: ["string", "null"]
        submittedBy:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - patientId
        - formType
        - status
        - createdAt
        - updatedAt

    CreateFormBody:
      type: object
      properties:
        patientId:
          type: integer
        formType:
          type: string
          enum: [primary_exam, daily_diary, epicrisis, consultation]
        complaints:
          type: ["string", "null"]
        anamnesis:
          type: ["string", "null"]
        objectiveStatus:
          type: ["string", "null"]
        diagnosis:
          type: ["string", "null"]
        treatment:
          type: ["string", "null"]
        recommendations:
          type: ["string", "null"]
        doctorNotes:
          type: ["string", "null"]
      required:
        - patientId
        - formType

    UpdateFormBody:
      type: object
      properties:
        complaints:
          type: ["string", "null"]
        anamnesis:
          type: ["string", "null"]
        objectiveStatus:
          type: ["string", "null"]
        diagnosis:
          type: ["string", "null"]
        treatment:
          type: ["string", "null"]
        recommendations:
          type: ["string", "null"]
        doctorNotes:
          type: ["string", "null"]

    Appointment:
      type: object
      properties:
        id:
          type: integer
        patientId:
          type: integer
        patientName:
          type: string
        specialistType:
          type: string
          enum: [doctor, physiotherapy, massage, psychologist, speech_therapy]
        specialistName:
          type: string
        scheduledDate:
          type: string
        scheduledTime:
          type: string
        duration:
          type: integer
        status:
          type: string
          enum: [scheduled, in_progress, completed, cancelled]
        notes:
          type: ["string", "null"]
        completedAt:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - patientId
        - patientName
        - specialistType
        - specialistName
        - scheduledDate
        - scheduledTime
        - duration
        - status
        - createdAt

    CreateAppointmentBody:
      type: object
      properties:
        patientId:
          type: integer
        specialistType:
          type: string
          enum: [doctor, physiotherapy, massage, psychologist, speech_therapy]
        specialistName:
          type: string
        scheduledDate:
          type: string
        scheduledTime:
          type: string
        duration:
          type: integer
        notes:
          type: ["string", "null"]
      required:
        - patientId
        - specialistType
        - specialistName
        - scheduledDate
        - scheduledTime
        - duration

    UpdateAppointmentBody:
      type: object
      properties:
        status:
          type: string
          enum: [scheduled, in_progress, completed, cancelled]
        notes:
          type: ["string", "null"]

    GenerateScheduleBody:
      type: object
      properties:
        patientId:
          type: integer
        startDate:
          type: string
        procedures:
          type: array
          items:
            type: string
      required:
        - patientId
        - startDate

    DashboardSummary:
      type: object
      properties:
        totalPatients:
          type: integer
        activePatients:
          type: integer
        todayAppointments:
          type: integer
        completedToday:
          type: integer
        pendingForms:
          type: integer
        scheduledDischarges:
          type: integer
      required:
        - totalPatients
        - activePatients
        - todayAppointments
        - completedToday
        - pendingForms
        - scheduledDischarges
